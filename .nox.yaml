# nox configuration — the security/dependency gate that replaces dependabot.
# Schema reference: https://github.com/nox-hq/nox
#
# Only GENERATED or PROSE artifacts are excluded here. First-party source
# (src/, tests/, scripts/, examples/, .github/) is scanned, and — importantly —
# so is package-lock.json: nox builds the dependency graph from the lockfile
# (excluding it drops dependency scanning to zero, which would defeat the
# dependabot replacement). Findings the excludes below do NOT silence are
# surfaced by the report-only CI gate; nothing is hidden by blanket directory
# excludes.

scan:
  exclude:
    # TypeScript build output (tsc --outDir dist). Generated, not committed
    # (see .gitignore), but excluded so a local `nox scan` after a build does
    # not re-trip secret/slopsquat heuristics on emitted/declaration files.
    # Classification: Acceptable Pattern (generated). Last reviewed: 2026-07-11
    - dist/
    - lib/
    # nox's own baseline/cache and scan output — finding fingerprints are
    # SHA-256 hex that re-trip the secret detector. Never scan the scanner.
    # Classification: Acceptable Pattern. Last reviewed: 2026-07-11
    - .nox/
    - findings.json
    - nox-results/
    # Markdown is prose. The entropy/secret rules can fire HIGH severity on
    # ordinary README/CHANGELOG lines in a fresh CI environment (long hex/
    # base64-looking strings in examples, release notes, etc.) — false
    # positives, no real secrets. Real secret patterns in code are still
    # caught. Literal + globs are all required: "*.md" matches root files,
    # "**/*.md" matches nested files (the "**/*.md" glob alone does NOT match
    # files at the repo root in nox's matcher).
    # Classification: False Positive (prose). Last reviewed: 2026-07-11
    - README.md
    - "*.md"
    - "**/*.md"

# NOTE: package-lock.json is deliberately NOT excluded so dependency-vulnerability
# scanning stays active. Its one current finding — VULN-002 (medium, low
# confidence) "msw is suspiciously similar to ms" — is a false positive (msw =
# Mock Service Worker, a legitimate widely-used package). It is medium severity,
# so it does not trip the critical/high CI gate. If it ever becomes noisy,
# accept it explicitly with `nox baseline add <fingerprint>` + commit .nox/,
# never by excluding the whole lockfile.

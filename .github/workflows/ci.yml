name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ${{ github.event_name == 'pull_request' && fromJSON('["22.x"]') || fromJSON('["22.x", "24.x"]') }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Clean install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint

    - name: Check formatting
      run: npm run format:check

    - name: Run tests
      run: npm run test:coverage -- --run

    - name: Build project
      run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Install nox (pinned + sha256-verified binary)
      env:
        NOX_VERSION: "1.7.1"
        NOX_SHA256: "3106ab3ce7197f43a45fc1128ea27112686421e8ec3eac9be356d4ca42ab4c89"
      run: |
        curl -sL -o nox.tar.gz \
          "https://github.com/nox-hq/nox/releases/download/v${NOX_VERSION}/nox_${NOX_VERSION}_linux_amd64.tar.gz"
        echo "${NOX_SHA256}  nox.tar.gz" | sha256sum -c -
        tar xzf nox.tar.gz && sudo mv nox /usr/local/bin/ && nox version

    - name: Run nox security scan
      run: nox scan . -format json,sarif -output nox-results || true

    - name: Upload nox SARIF to code scanning
      # nox 1.7.1 writes the SARIF as results.sarif (not findings.sarif).
      if: always() && hashFiles('nox-results/results.sarif') != ''
      uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
      with:
        sarif_file: nox-results/results.sarif
        category: nox

    - name: Gate on critical/high nox findings (report-only)
      # Report-only for this repo: the scan is NOT yet clean. Remaining
      # critical/high are all in first-party GitHub Actions workflows, which
      # policy forbids excluding in .nox.yaml:
      #   - IAC-351 (x2, "CI variable with hardcoded secret") is a FALSE
      #     POSITIVE on the OIDC write-permission line (a permission scope,
      #     not a secret).
      #   - IAC-013 (x1) flags softprops/action-gh-release@v2 pinned to a
      #     mutable tag instead of a commit SHA — a real hardening item.
      # This step never fails the build; it surfaces findings for review.
      # To make it blocking once findings are triaged, build a CI-derived
      # baseline (`nox baseline add <fingerprint>` + commit .nox/) and change
      # the final `exit 0` to `exit 1`.
      if: always() && hashFiles('nox-results/findings.json') != ''
      run: |
        f=nox-results/findings.json
        new=$(jq '[.findings[]? | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined"))] | length' "$f" 2>/dev/null || echo 0)
        echo "unbaselined critical/high: $new"
        if [ "$new" -gt 0 ]; then
          echo "::warning::$new unbaselined critical/high nox finding(s) (report-only). Review before enforcing."
          jq '.findings[] | select((.Severity=="critical" or .Severity=="high") and (.Status!="baselined")) | {severity:.Severity, rule:.RuleID, file:.Location.FilePath, line:.Location.StartLine, message:.Message}' "$f"
        fi
        exit 0

    - name: Upload nox artifacts
      # Enables building a CI-derived baseline (nox fingerprints differ
      # between a fresh CI env and local scans — always baseline from these).
      if: always() && hashFiles('nox-results/**') != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nox-results
        path: nox-results/
        retention-days: 7
